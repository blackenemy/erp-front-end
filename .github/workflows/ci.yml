name: CI/CD Frontend (Main Only)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-and-deploy:
    name: Lint, Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Type check
        run: |
          pnpm lint
          pnpm typecheck

      - name: Build Project
        run: pnpm build

      # --- ขั้นตอน Deployment (Standalone Mode) ---
      - name: Deploy to CT 104
        if: github.event_name == 'push'
        run: |
          # 1. ตั้งค่าตัวแปรเพื่อลดความผิดพลาด
          APP_NAME="erp"
          DEST_DIR="/var/www/hubs-frontend"
          STANDALONE_DIR="apps/$APP_NAME/.next/standalone"

          # 2. ส่งไฟล์หลักจาก Standalone (server.js และ node_modules)
          # ใช้เครื่องหมาย / ท้าย path เพื่อก๊อปปี้เฉพาะเนื้อหาข้างในไปวางที่ root
          rsync -avz --delete $STANDALONE_DIR/ root@10.0.0.6:$DEST_DIR/

          # 3. [แก้ปัญหา CSS] ส่งไฟล์ Static (CSS/JS)
          # Next.js standalone จะมองหาไฟล์ที่ <root>/apps/<app_name>/.next/static
          ssh root@10.0.0.6 "mkdir -p $DEST_DIR/apps/$APP_NAME/.next/static"
          rsync -avz --delete apps/$APP_NAME/.next/static/ root@10.0.0.6:$DEST_DIR/apps/$APP_NAME/.next/static/

          # 4. [แก้ Error 23] ส่งไฟล์ Public (ตรวจสอบก่อนว่ามีโฟลเดอร์ไหม)
          if [ -d "apps/$APP_NAME/public" ]; then
            ssh root@10.0.0.6 "mkdir -p $DEST_DIR/apps/$APP_NAME/public"
            rsync -avz --delete apps/$APP_NAME/public/ root@10.0.0.6:$DEST_DIR/apps/$APP_NAME/public/
          else
            echo "⚠️ Skip syncing public folder: Directory not found"
          fi

          # 5. สั่ง PM2 รีสตาร์ท (ใช้ Path ที่รันมือแล้วผ่านเมื่อกี้)
          ssh root@10.0.0.6 "cd $DEST_DIR && (pm2 reload hubs-frontend || pm2 start apps/$APP_NAME/server.js --name hubs-frontend)"
