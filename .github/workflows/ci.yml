name: CI/CD Frontend (Main Only)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-and-deploy:
    name: Lint, Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Type check
        run: |
          pnpm lint
          pnpm typecheck

      - name: Build Project
        run: pnpm build

      # --- ขั้นตอน Deployment (Standalone Mode) ---
      - name: Deploy to CT 104
        if: github.event_name == 'push'
        run: |
          # 1. นิยามตำแหน่งไฟล์ (ปรับตามโครงสร้างของคุณ)
          APP_NAME="erp"
          STANDALONE_PATH="apps/$APP_NAME/.next/standalone"

          # 2. ส่งไฟล์หลัก (Server + Node Modules ที่จำเป็น) 
          # ส่ง "เนื้อหา" ใน standalone ไปที่ root ของเว็บ
          rsync -avz --delete $STANDALONE_PATH/ root@10.0.0.6:/var/www/hubs-frontend/

          # 3. [แก้ไขเรื่อง CSS] ส่งไฟล์ Static และ Public ไปที่ตำแหน่งที่ server.js มองหา
          # Next.js standalone จะมองหาไฟล์ที่ apps/ชื่อแอป/...
          mkdir -p apps/$APP_NAME/.next/
          rsync -avz --delete apps/$APP_NAME/.next/static/ root@10.0.0.6:/var/www/hubs-frontend/apps/$APP_NAME/.next/static/
          rsync -avz --delete apps/$APP_NAME/public/ root@10.0.0.6:/var/www/hubs-frontend/apps/$APP_NAME/public/

          # 4. สั่ง PM2 รีโหลดแอปโดยรันไฟล์ server.js ตรงๆ
          # ไม่ต้อง pnpm install ที่เครื่องปลายทางแล้ว เพราะ standalone เตรียมมาให้หมดแล้ว
          ssh root@10.0.0.6 "cd /var/www/hubs-frontend && (pm2 reload hubs-frontend || pm2 start apps/$APP_NAME/server.js --name hubs-frontend)"
