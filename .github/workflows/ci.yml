name: CI/CD Frontend (Main Only)

on:
  push:
    branches: ["main"] # รันเฉพาะตอน push ลง main
  pull_request:
    branches: ["main"] # รันเฉพาะตอนเปิด PR เข้าหา main

jobs:
  check-and-deploy:
    name: Lint, Build & Deploy
    runs-on: self-hosted # ใช้เครื่อง CT 108 ของคุณ

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Type check
        run: |
          pnpm lint
          pnpm typecheck

      - name: Build Project
        run: pnpm build

      # --- ขั้นตอน Deployment ---
      - name: Deploy to CT 104
        if: github.event_name == 'push' # ทำเฉพาะตอน push/merge จริงๆ (ไม่ทำตอนแค่เช็ค PR)
        run: |
          # 1. Sync ไฟล์ที่ build มาไปที่เครื่อง 104
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            apps/erp/.next/ \
            root@10.0.0.6:/var/www/hubs-frontend/.next/

          # 2. Sync package files และ ecosystem config
          rsync -avz \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            ecosystem.config.js \
            root@10.0.0.6:/var/www/hubs-frontend/

          # 3. Sync apps directory structure (ยกเว้น node_modules)
          rsync -avz --delete \
            --exclude='node_modules' \
            apps/ \
            root@10.0.0.6:/var/www/hubs-frontend/apps/

          # 4. Sync packages directory structure (ยกเว้น node_modules และ coverage)
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='coverage' \
            packages/ \
            root@10.0.0.6:/var/www/hubs-frontend/packages/

          # 5. Install dependencies และ restart PM2
          ssh root@10.0.0.6 "cd /var/www/hubs-frontend && pnpm install --frozen-lockfile && pm2 restart hubs-frontend || pm2 start ecosystem.config.js"
